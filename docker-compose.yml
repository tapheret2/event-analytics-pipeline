# =============================================================================
# Event Analytics Pipeline - Docker Compose
# =============================================================================
# Usage: docker compose up -d --build
# =============================================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pipeline:pipeline123@postgres:5432/event_analytics
    AIRFLOW__WEBSERVER__SECRET_KEY: "event-analytics-secret-key-change-me"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    POSTGRES_USER: pipeline
    POSTGRES_PASSWORD: pipeline123
    POSTGRES_DB: event_analytics
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    PIPELINE_DATA_DIR: /opt/airflow/data
    DBT_PROFILES_DIR: /opt/airflow/dbt
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./dbt:/opt/airflow/dbt
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - pipeline-network

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Data Warehouse
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pipeline-postgres
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline123
      POSTGRES_DB: event_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d event_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-network

  # ---------------------------------------------------------------------------
  # Airflow Init - Database migration & admin user creation
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: pipeline-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        echo "✅ Airflow initialized successfully!"
    restart: "no"

  # ---------------------------------------------------------------------------
  # Airflow Webserver
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: pipeline-airflow-webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Airflow Scheduler
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: pipeline-airflow-scheduler
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Streamlit Dashboard
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: pipeline-streamlit
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline123
      POSTGRES_DB: event_analytics
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipeline-network

volumes:
  postgres_data:
    name: pipeline-postgres-data

networks:
  pipeline-network:
    name: pipeline-network
    driver: bridge
